name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.10.0

      - name: Create local.properties with required keys
        run: |
          cat > android/local.properties << 'ENDPROP'
          sdk.dir=/opt/android-sdk
          flutter.sdk=/opt/hostedtoolcache/flutter/stable-3.10.0-x64/flutter
          flutter.versionCode=1
          flutter.versionName=1.0.0
          GOOGLE_MAPS_API_KEY=AIzaSyPlaceholderMapsKeyForCIBuild
          ENDPROP

      - name: Create placeholder google-services.json
        run: |
          cat > android/app/google-services.json << 'ENDOFJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "times-up-placeholder",
              "storage_bucket": "times-up-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:00000000000000000000",
                  "android_client_info": {
                    "package_name": "com.jordyhers.times_up_flutter"
                  }
                },
                "api_key": [
                  {
                    "current_key": "AIzaSyPlaceholderKeyForCIBuildsOnly"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          ENDOFJSON

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Release APK
        run: flutter build apk --release -t lib/main_production.dart --dart-define=CI_BUILD=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
