name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.10.0

      - name: Setup Firebase (create placeholder google-services.json if missing)
        run: |
          if [ ! -f android/app/google-services.json ]; then
            printf '%s\n' \
              "{" \
              "  \"project_info\": {" \
              "    \"project_number\": \"000000000000\"," \
              "    \"project_id\": \"times-up-placeholder\"," \
              "    \"storage_bucket\": \"times-up-placeholder.appspot.com\"" \
              "  }," \
              "  \"client\": [" \
              "    {" \
              "      \"client_info\": {" \
              "        \"mobilesdk_app_id\": \"1:000000000000:android:0000000000000000\"," \
              "        \"android_client_info\": {" \
              "          \"package_name\": \"com.jordyhers.times_up_flutter\"" \
              "        }" \
              "      }," \
              "      \"api_key\": [" \
              "        { \"current_key\": \"AIzaSyPlaceholderKeyForCIBuild\" }" \
              "      ]," \
              "      \"services\": {" \
              "        \"appinvite_service\": { \"other_platform_oauth_client\": [] }" \
              "      }" \
              "    }" \
              "  ]," \
              "  \"configuration_version\": \"1\"" \
              "}" > android/app/google-services.json
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Release APK
        run: flutter build apk --release -t lib/main_production.dart

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
